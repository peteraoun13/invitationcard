    <title>Jad &amp; Hala's Wedding Invitation</title>
    <style>
      @font-face {
        font-family: "Cormorant Garamond";
        src: url("/fonts/CormorantGaramond-Regular.ttf") format("truetype");
        font-display: swap;
        font-style: normal;
        font-weight: 400;
      }

      @font-face {
        font-family: "Cormorant Garamond";
        src: url("/fonts/CormorantGaramond-Medium.ttf") format("truetype");
        font-display: swap;
        font-style: normal;
        font-weight: 500;
      }

      @font-face {
        font-family: "Cormorant Garamond";
        src: url("/fonts/CormorantGaramond-SemiBold.ttf") format("truetype");
        font-display: swap;
        font-style: normal;
        font-weight: 600;
      }

      @font-face {
        font-family: "The Signature Wedding";
        src: url("/fonts/TheWeddingSignature-Regular.ttf") format("truetype");
        font-display: swap;
        font-style: normal;
        font-weight: 400;
      }

      html,
      body,
      #root {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #f7f4f1;
      }

      .initial-loading-screen {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: #5d5144;
        text-align: center;
        background:
          radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.9), transparent 39%),
          linear-gradient(180deg, #fbfaf7 0%, #eee6dc 100%);
      }

      .initial-loading-screen__inner {
        display: grid;
        gap: clamp(13px, 2svh, 18px);
        justify-items: center;
        padding: 24px;
      }

      .initial-loading-screen__mark {
        margin: 0;
        color: #5e5346;
        font-family: "The Signature Wedding", "Bickham Script Pro", "Edwardian Script ITC", Georgia, serif;
        font-size: clamp(4.8rem, 18vw, 7.4rem);
        font-weight: 400;
        line-height: 0.78;
        text-shadow: 0 10px 34px rgba(83, 70, 55, 0.12);
      }

      .initial-loading-screen__rule {
        position: relative;
        display: block;
        width: clamp(92px, 26vw, 148px);
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(94, 83, 70, 0.42), transparent);
      }

      .initial-loading-screen__rule::after {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 5px;
        height: 5px;
        content: "";
        border-radius: 50%;
        background: rgba(94, 83, 70, 0.58);
        box-shadow: 0 0 18px rgba(94, 83, 70, 0.16);
        transform: translate(-50%, -50%);
      }

      .initial-loading-screen__copy {
        margin: 0;
        color: rgba(94, 83, 70, 0.64);
        font-family: "Cormorant Garamond", "Palatino Linotype", Georgia, serif;
        font-size: clamp(0.72rem, 2.2vw, 0.88rem);
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loading-screen">
        <div class="initial-loading-screen__inner">
          <p class="initial-loading-screen__mark">J &amp; H</p>
          <span class="initial-loading-screen__rule" aria-hidden="true"></span>
          <p class="initial-loading-screen__copy">Preparing your experience</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
